<!DOCTYPE html>
<!--
  Extra Layout · Comparison Table Page
  用于渲染 Act 3 的竞品 6 维度矩阵。
  与本 skill 的内建 deck 模板共用 CSS 变量。
  使用方式：
    - PRODUCTS: 头部列名数组（1 个目标 + 3 个竞品）
    - DIMENSIONS: 6 行维度
    - SCORES: 6x4 分数矩阵（带 1 行证据 tooltip / caption）
-->
<section class="slide layout-comparison" data-layout="comparison-table-page">
  <header class="slide-meta">
    <span class="act-tag">ACT 3 · VS</span>
    <span class="page-num">{{PAGE_NUM}}</span>
  </header>

  <h2 class="slide-title">{{TITLE}}</h2>
  <p class="slide-lede">{{LEDE}}</p>

  <div class="matrix-wrap">
    <table class="comparison-matrix">
      <thead>
        <tr>
          <th class="dim-col">维度</th>
          <!-- 产品列：第一列加 highlight -->
          {{PRODUCT_HEADERS}}
        </tr>
      </thead>
      <tbody>
        <!-- 每行一个维度：
             <tr>
               <th>学习曲线</th>
               <td class="primary">4<span class="ev">30 分钟跑通</span></td>
               <td>3<span class="ev">需 2 小时</span></td>
               ...
             </tr>
        -->
        {{MATRIX_BODY}}
      </tbody>
      <tfoot>
        <tr>
          <th>总分</th>
          {{TOTALS}}
        </tr>
      </tfoot>
    </table>
  </div>

  <footer class="slide-footer">
    <span class="note">分数 1–5，每个分数附证据（鼠标悬停查看）。来源见 Appendix。</span>
  </footer>
</section>

<style>
  .layout-comparison {
    display: grid;
    grid-template-rows: auto auto auto 1fr auto;
    gap: 1rem;
    padding: 3rem 4rem;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
  }
  .layout-comparison .slide-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .layout-comparison .slide-title {
    font-family: var(--font-serif);
    font-size: 2.2rem;
    margin: 0;
    line-height: 1.15;
  }
  .layout-comparison .slide-lede {
    font-size: 0.95rem;
    color: var(--muted);
    margin: 0;
  }
  .layout-comparison .matrix-wrap {
    overflow: auto;
    min-height: 0;
  }
  .layout-comparison .comparison-matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }
  .layout-comparison .comparison-matrix th,
  .layout-comparison .comparison-matrix td {
    padding: 0.8rem 1rem;
    text-align: center;
    border-bottom: 1px solid var(--muted);
    vertical-align: middle;
  }
  .layout-comparison .comparison-matrix thead th {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid var(--ink);
  }
  .layout-comparison .comparison-matrix .dim-col,
  .layout-comparison .comparison-matrix tbody th,
  .layout-comparison .comparison-matrix tfoot th {
    text-align: left;
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 0.95rem;
    color: var(--ink);
  }
  .layout-comparison .comparison-matrix td {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 600;
    position: relative;
  }
  .layout-comparison .comparison-matrix td.primary {
    color: var(--accent);
  }
  .layout-comparison .comparison-matrix td .ev {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--muted);
    margin-top: 0.2rem;
    line-height: 1.3;
  }
  .layout-comparison .comparison-matrix tfoot {
    font-weight: 700;
  }
  .layout-comparison .comparison-matrix tfoot td {
    font-size: 1.7rem;
    border-bottom: none;
    border-top: 2px solid var(--ink);
  }
  .layout-comparison .slide-footer {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
  }
</style>
